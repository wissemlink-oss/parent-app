<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>تطبيق الأولياء</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
:root{--p:#667eea;--p2:#764ba2;--bg:#f0f2f5;--card:#fff;--text:#0f172a;--gray:#64748b;--light:#e2e8f0;--success:#16a34a;--warning:#d97706;--danger:#dc2626;--new:#2563eb}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI','Noto Naskh Arabic',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow:hidden;height:100vh}
#app{width:100%;height:100vh;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg);overflow-y:auto}
.screen.active{display:flex}

/* Login */
#login-screen{justify-content:center;align-items:center;background:linear-gradient(135deg,var(--p),var(--p2));padding:30px}
.login-box{width:100%;max-width:360px;text-align:center}
.login-logo{width:80px;height:80px;background:rgba(255,255,255,.15);border-radius:22px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:40px}
.login-box h1{color:#fff;font-size:24px;margin-bottom:4px}
.login-box p{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:30px}
.login-box input{width:100%;padding:16px;border:none;border-radius:12px;font-size:18px;text-align:center;direction:ltr;background:rgba(255,255,255,.92);outline:none;letter-spacing:3px;font-family:monospace}
.login-box button{width:100%;padding:16px;margin-top:14px;border:none;border-radius:12px;background:#fff;color:var(--p2);font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s}
.login-box button:active{transform:scale(.97)}
.login-error{background:rgba(220,38,38,.9);color:#fff;padding:10px 14px;border-radius:10px;margin-top:12px;font-size:13px;display:none}
.login-loader{display:none;margin:14px auto;width:28px;height:28px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.offline-badge{display:none;background:rgba(220,38,38,.9);color:#fff;text-align:center;padding:6px;font-size:11px;font-weight:600}

/* Header */
.app-header{background:linear-gradient(135deg,var(--p),var(--p2));padding:14px 16px;color:#fff;flex-shrink:0;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-info h2{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-info span{font-size:12px;opacity:.8;display:block;margin-top:1px}
.score-badge{background:rgba(255,255,255,.2);padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;flex-shrink:0}
.header-sub{display:flex;gap:4px;margin-top:10px}
.header-sub button{flex:1;padding:7px;border:none;background:rgba(255,255,255,.12);color:#fff;border-radius:8px;font-size:12px;cursor:pointer;transition:background .2s;font-family:inherit}
.header-sub button.active{background:rgba(255,255,255,.25);font-weight:700}
.logout-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:11px;cursor:pointer;flex-shrink:0;font-family:inherit}

/* Content */
.content{padding:12px 14px;flex:1;overflow-y:auto}
.tab{display:none}
.tab.active{display:block}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:13px;color:var(--gray);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.progress-row{display:flex;align-items:center;gap:16px}
.p-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-circle .inner{width:58px;height:58px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--new)}
.p-info h4{font-size:15px;font-weight:700}
.p-info .sub{font-size:12px;color:var(--gray);margin-top:2px}
.p-info .change{font-size:12px;margin-top:4px}
.change.up{color:var(--success)}
.change.down{color:var(--danger)}
.msg-item{padding:10px 0;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:13px}
.msg-item:last-child{border:none}
.msg-item .title{display:flex;justify-content:space-between}
.msg-item .title .date{font-size:11px;color:var(--gray);font-weight:400}
.msg-item .preview{font-size:12px;color:var(--gray);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rem-item{padding:12px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.rem-item:last-child{border:none}
.rem-item .top{display:flex;justify-content:space-between;align-items:center}
.rem-item .date{font-size:11px;color:var(--gray);margin-top:4px}
.rem-item .note{font-size:12px;color:var(--gray);margin-top:4px;line-height:1.5}

.status-tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600}
.st-pending{background:#fef3c7;color:var(--warning)}
.st-done{background:#dcfce7;color:var(--success)}
.progress-card{text-align:center;padding:20px}
.bar-group{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:3px}
.bar-track{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--p),var(--p2));transition:width .8s ease}
.loading{text-align:center;padding:40px;color:var(--gray);font-size:13px}
.loading::before{content:'';display:block;width:32px;height:32px;border:3px solid var(--light);border-top-color:var(--p);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 10px}
.empty-state{text-align:center;padding:40px 20px;color:var(--gray)}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:13px}
.tab-section-title{font-size:13px;color:var(--gray);margin:14px 0 8px;font-weight:600}
</style>
</head>
<body>
<div id="offline-badge" class="offline-badge">⚠️ غير متصل بالخادم</div>
<div id="app">
  <div id="login-screen" class="screen active">
    <div class="login-box">
      <div class="login-logo">👨‍👩‍👧</div>
      <h1>مرحباً بك</h1>
      <p>تابع تقدم طفلك من أي مكان</p>
      <input id="pid-input" type="text" inputmode="text" autocomplete="off"
             placeholder="🔑 أدخل رمز الدخول" maxlength="20" dir="ltr"
             onkeydown="if(event.key==='Enter')doLogin()">
      <label style="display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);font-size:12px;margin-top:8px;justify-content:center">
        <input type="checkbox" id="save-pid" checked> حفظ رمز الدخول
      </label>
      <div id="login-error" class="login-error"></div>
      <div id="login-loader" class="login-loader"></div>
      <button onclick="doLogin()">دخول</button>
      <div class="login-hint" style="color:rgba(255,255,255,.4);font-size:11px;margin-top:30px">
        رمز الدخول مكون من 8 أحرف وأرقام<br>يُعطى لك من المركز
      </div>
    </div>
  </div>

  <div id="app-screen" class="screen">
    <div class="app-header">
      <div class="header-top">
        <div class="avatar" id="av">👤</div>
        <div class="header-info">
          <h2 id="child-name">—</h2>
        </div>
        <div class="score-badge" id="score-badge">—</div>
        <button class="logout-btn" onclick="doLogout()">✕</button>
      </div>
      <div class="header-sub" id="tabs">
        <button class="active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 الرئيسية</button>
        <button data-tab="messages" onclick="switchTab('messages')">✉️ الرسائل</button>
        <button data-tab="reminders" onclick="switchTab('reminders')">⏰ تذكيرات</button>
        <button data-tab="progress" onclick="switchTab('progress')">📈 التقدم</button>
      </div>
    </div>
    <div class="content" id="content-area">
      <div class="tab active" id="tab-dashboard"></div>
      <div class="tab" id="tab-messages"></div>
      <div class="tab" id="tab-reminders"></div>
      <div class="tab" id="tab-progress"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  إعدادات MQTT — غيّرها بعد التسجيل
// ═══════════════════════════════════════════
const MQTT_CONFIG = {
  broker:  "wss://92b691ccb7374ba8ad5ad798326a8bd0.s1.eu.hivemq.cloud:8884/mqtt",
  username: "UTAIM",
  password: "UTAIM2026a",
  topicPrefix: "child",
};

let mqttClient = null;
let currentParentId = "";
let mqttConnected = false;
let childInfo = {};
let childProgress = {};
let childMessages = [];
let childReminders = [];
let childStats = {};
let childSessions = [];

// ─── Arabic Date ───
const AR_MONTHS = ["جانفي","فيفري","مارس","أفريل","ماي","جوان","جويلية","أوت","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const AR_DAYS = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
function fmtDate(d) { return d.getDate() + " " + AR_MONTHS[d.getMonth()] + " " + d.getFullYear(); }
function fmtDateShort(d) { return d.getDate() + " " + AR_MONTHS[d.getMonth()]; }
function fmtDateTime(d) {
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return AR_DAYS[d.getDay()] + " — " + d.getDate() + " " + AR_MONTHS[d.getMonth()] + " " + h + ":" + m;
}

// ─── Game Mappings (مثل database.py) ───
const GAME_CAT = {"memory":"Cognitif","colors":"Cognitif","numbers":"Cognitif","basket_sort":"Cognitif","coloring":"Cognitif","color_matching":"Cognitif","fruits_vegetables":"Cognitif","compare":"Cognitif","name_scramble":"Cognitif","match":"Cognitif","egg_saver":"Physique","puzzle":"Physique","hal9a":"Physique","smile":"Social","quiz_numbers":"Social","quiz_animals":"Social","quiz_colors":"Social"};
const GAME_TAG = {"memory":"مطابقة","basket_sort":"مطابقة","compare":"مطابقة","match":"مطابقة","fruits_vegetables":"رياضيات","colors":"تركيب و ترتيب","coloring":"تركيب و ترتيب","color_matching":"تركيب و ترتيب","quiz_colors":"تركيب و ترتيب","numbers":"تصنيف","name_scramble":"تصنيف","quiz_numbers":"تصنيف","egg_saver":"إدراك الفضاء","puzzle":"إدراك الفضاء","hal9a":"إدراك الفضاء","smile":"إدراك الفضاء"};

// ─── MQTT Connect ───
function connectMQTT(parentId) {
  try {
    mqttClient = mqtt.connect(MQTT_CONFIG.broker, {
      username: MQTT_CONFIG.username,
      password: MQTT_CONFIG.password,
      clientId: "parent_" + parentId + "_" + Math.random().toString(36).substr(2,8),
      clean: true,
      keepalive: 30,
      reconnectPeriod: 3000,
    });

    mqttClient.on("connect", () => {
      mqttConnected = true;
      document.getElementById("offline-badge").style.display = "none";
      const topic = MQTT_CONFIG.topicPrefix + "/parent/" + parentId + "/#";
      mqttClient.subscribe(topic, {qos:1});
    });

    mqttClient.on("message", (topic, payload) => {
      const t = topic.split("/").pop();
      try { const data = JSON.parse(payload.toString()); handleData(t, data); }
      catch(e) { console.warn("JSON parse error:", e); }
    });

    mqttClient.on("close", () => {
      document.getElementById("offline-badge").style.display = "block";
    });

    mqttClient.on("error", (e) => {
      console.error("MQTT error:", e);
    });
  } catch(e) {
    console.error("MQTT connect failed:", e);
  }
}

function handleData(type, data) {
  switch(type) {
    case "info":     childInfo = data; break;
    case "progress": childProgress = data; break;
    case "messages": childMessages = data || []; break;
    case "reminders": childReminders = data || []; break;
    case "stats":   childStats = data || {}; break;
    case "sessions": childSessions = data || []; break;
    case "update":  break;
  }
  renderCurrentTab();
}

function renderCurrentTab() {
  const active = document.querySelector(".tab.active");
  if (!active) return;
  const id = active.id;
  if (id === "tab-dashboard") renderDashboard();
  else if (id === "tab-messages") renderMessages();
  else if (id === "tab-reminders") renderReminders();
  else if (id === "tab-progress") renderProgress();
}

// ─── Login / Logout ───
function doLogin() {
  const pid = document.getElementById("pid-input").value.trim();
  if (!pid) return;
  const err = document.getElementById("login-error");
  const loader = document.getElementById("login-loader");
  err.style.display = "none";
  loader.style.display = "block";

  // نتصل بـ MQTT ونشترك في topic الطفل
  currentParentId = pid;
  connectMQTT(pid);

  // نستنى البيانات (تصل خلال 1-5 ثواني)
  let waited = 0;
  const maxWait = 30;
  const iv = setInterval(() => {
    waited++;
    if (childInfo && childInfo.name) {
      clearInterval(iv);
      loader.style.display = "none";
      if (document.getElementById("save-pid").checked)
        localStorage.setItem("parent_id", pid);
      showApp();
    } else if (waited >= maxWait) {
      clearInterval(iv);
      loader.style.display = "none";
      err.textContent = mqttConnected ? "رمز الدخول غير صحيح أو لم تصل البيانات بعد، حاول مرة أخرى" : "تعذر الاتصال بالخادم، تحقق من اتصالك بالإنترنت";
      err.style.display = "block";
      currentParentId = "";
      mqttConnected = false;
      if (mqttClient) { mqttClient.end(); mqttClient = null; }
    }
  }, 1000);
}

function doLogout() {
  localStorage.removeItem("parent_id");
  currentParentId = "";
  mqttConnected = false;
  childInfo = {}; childProgress = {}; childMessages = []; childReminders = [];
  childStats = {}; childSessions = [];
  if (mqttClient) { mqttClient.end(); mqttClient = null; }
  document.getElementById("app-screen").classList.remove("active");
  document.getElementById("login-screen").classList.add("active");
  document.getElementById("pid-input").value = "";
  document.getElementById("login-error").style.display = "none";
  document.getElementById("offline-badge").style.display = "none";
}

function showApp() {
  document.getElementById("login-screen").classList.remove("active");
  document.getElementById("app-screen").classList.add("active");
  document.getElementById("av").textContent = childInfo.has_photo ? "📸" : "👤";
  document.getElementById("child-name").textContent = childInfo.name || "—";
  document.getElementById("score-badge").textContent = (childProgress.current_score || 0) + "%";
  switchTab("dashboard");
}

// ─── Tab Switching ───
function switchTab(name) {
  document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
  document.querySelector(`#tabs button[data-tab="${name}"]`).classList.add("active");
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  if (name === "dashboard") renderDashboard();
  else if (name === "messages") renderMessages();
  else if (name === "reminders") renderReminders();
  else if (name === "progress") renderProgress();
}

// ─── Dashboard ───
function renderDashboard() {
  const el = document.getElementById("tab-dashboard");
  const score = childProgress.current_score || 0;
  const deg = Math.round((score / 100) * 360);
  const color = score >= 70 ? "#16a34a" : score >= 40 ? "#d97706" : "#dc2626";
  const dev = childProgress.weekly_dev || 0;

  let html = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:16px">
        <div class="p-circle" style="background:conic-gradient(${color} 0deg ${deg}deg,#e2e8f0 ${deg}deg 360deg);flex-shrink:0">
          <div class="inner">${Math.round(score)}%</div>
        </div>
        <div style="flex:1">
          <div style="font-size:18px;font-weight:700">${childInfo.name || "—"}</div>
          <div style="margin-top:8px;font-size:13px;color:var(--gray);line-height:1.8">
            <div>العمر البيولوجي: ${childInfo.age || "—"} سنة</div>
            <div>العمر الذهني: ${childInfo.mental_age || "—"} سنة</div>
            <div>الفرع: ${childInfo.branch || "—"}</div>
            <div>القسم: ${childInfo.class_name || "—"}</div>
            <div>التشخيص: ${childInfo.diagnosis || "—"}</div>
            <div>درجة الإعاقة: ${childInfo.disability_degree || "—"}</div>
            ${childInfo.notes ? '<div style="margin-top:4px;font-size:12px;color:#94a3b8">📝 ' + childInfo.notes + '</div>' : ""}
          </div>
          <div style="margin-top:6px">
            <span style="background:#f1f5f9;padding:2px 10px;border-radius:999px;font-size:11px;color:var(--gray)">${dev > 0 ? "⬆ +" : dev < 0 ? "⬇ " : "➡ "}${dev ? Math.abs(Math.round(dev)) + "%" : "—"} هذا الأسبوع</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div style="color:#1e293b;margin-top:0;border-right:4px solid #2563eb;padding-right:10px;font-weight:700;font-size:14px;margin-bottom:10px">📈 إحصائيات الأداء العام</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <tr><th style="padding:6px 8px;text-align:right;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">المقياس</th><th style="padding:6px 8px;text-align:right;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">القيمة</th></tr>
        <tr><td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">عدد الجلسات الكلي</td><td style="padding:6px 8px;border-bottom:1px solid #e2e8f0"><strong>${childStats.total_sessions||0}</strong></td></tr>
        <tr><td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">الإجابات الصحيحة</td><td style="padding:6px 8px;border-bottom:1px solid #e2e8f0"><span style="display:inline-block;padding:2px 8px;border-radius:9999px;color:#fff;font-size:11px;font-weight:bold;background-color:#16a34a">${childStats.total_correct||0}</span></td></tr>
        <tr><td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">الإجابات الخاطئة</td><td style="padding:6px 8px;border-bottom:1px solid #e2e8f0"><span style="display:inline-block;padding:2px 8px;border-radius:9999px;color:#fff;font-size:11px;font-weight:bold;background-color:#dc2626">${childStats.total_wrong||0}</span></td></tr>
        <tr><td style="padding:6px 8px">معدل النجاح</td><td style="padding:6px 8px"><strong>${(childStats.success_rate||0).toFixed(1)}%</strong></td></tr>
      </table>
    </div>`;

  // آخر الرسائل
  html += `<div class="card"><div class="card-title">✉️ آخر الرسائل</div>`;
  const recentMsgs = (childMessages || []).slice(0, 3);
  if (recentMsgs.length === 0) html += "<div style='font-size:13px;color:var(--gray)'>لا توجد رسائل بعد</div>";
  else recentMsgs.forEach(m => {
    const d = new Date(m.sent_at);
    html += `<div class="msg-item">
      <div class="title"><span>${m.subject || "(بدون عنوان)"}</span><span class="date">${fmtDateShort(d)}</span></div>
      <div class="preview">${m.body.substring(0, 60)}${m.body.length>60?"...":""}</div>
    </div>`;
  });
  html += "</div>";

  // التذكيرات القادمة
  html += `<div class="card"><div class="card-title">⏰ التذكيرات القادمة</div>`;
  const pendRems = (childReminders || []).filter(r => !r.completed).slice(0, 3);
  if (pendRems.length === 0) html += "<div style='font-size:13px;color:var(--gray)'>لا توجد تذكيرات معلقة</div>";
  else pendRems.forEach(r => {
    html += `<div class="msg-item">
      <div class="title"><span>${r.message}</span><span class="date">${r.reminder_dt}</span></div>
    </div>`;
  });
  html += "</div>";

  el.innerHTML = html;
}

// ─── Messages ───
function renderMessages() {
  const el = document.getElementById("tab-messages");
  const msgs = childMessages || [];
  if (msgs.length === 0) {
    el.innerHTML = "<div class='empty-state'><div class='icon'>✉️</div><p>لا توجد رسائل بعد</p></div>";
    return;
  }
  const statusMap = {"success":"✅ تم","failed":"❌ فشل","pending":"⏳ قيد الإرسال"};
  let html = "";
  msgs.forEach(m => {
    const d = new Date(m.sent_at);
    html += `<div class="card">
      <div class="msg-item" style="border:none;padding:0">
        <div class="title">
          <span>📌 ${m.subject || "(بدون عنوان)"}</span>
          <span class="date">${fmtDate(d)}</span>
        </div>
        <div class="preview" style="margin-top:6px;white-space:normal">${m.body.substring(0, 100)}${m.body.length>100?"...":""}</div>
        <div style="margin-top:6px;display:flex;gap:6px;font-size:11px">
          <span style="color:var(--gray)">📅 ${fmtDate(d)}</span>
          <span style="color:var(--gray)">${m.channel === "sms" ? "💬 SMS" : "📱 تطبيق"}</span>
          <span>${statusMap[m.status] || m.status}</span>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

// ─── Reminders ───
function renderReminders() {
  const el = document.getElementById("tab-reminders");
  const rems = childReminders || [];
  if (rems.length === 0) {
    el.innerHTML = "<div class='empty-state'><div class='icon'>⏰</div><p>لا توجد تذكيرات</p></div>";
    return;
  }
  const pend = rems.filter(r => !r.completed);
  const done = rems.filter(r => r.completed);
  let html = "";
  if (pend.length > 0) {
    html += "<div class='tab-section-title'>⏳ معلقة</div>";
    pend.forEach(r => {
      html += `<div class="card">
        <div class="rem-item" style="border:none;padding:0">
          <div class="top"><span class="title">${r.message}</span><span class="status-tag st-pending">معلق</span></div>
          <div class="date">📅 ${r.reminder_dt}</div>
          ${r.notes ? '<div class="note">' + r.notes + '</div>' : ""}
          ${r.recurrence !== "none" ? "<div style='font-size:11px;color:var(--warning);margin-top:4px'>🔁 متكرر</div>" : ""}
        </div>
      </div>`;
    });
  }
  if (done.length > 0) {
    html += "<div class='tab-section-title'>✅ مكتملة</div>";
    done.forEach(r => {
      html += `<div class="card" style="opacity:.7">
        <div class="rem-item" style="border:none;padding:0">
          <div class="top"><span class="title">${r.message}</span><span class="status-tag st-done">مكتمل</span></div>
          <div class="date">📅 ${r.reminder_dt}</div>
        </div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

// ─── Progress (نسخة التقرير بالضبط) ───
function renderProgress() {
  const el = document.getElementById("tab-progress");
  const stats = childStats || {};
  const sessions = childSessions || [];
  const prog = childProgress || {};

  let html = `<div style="display:flex;gap:30px;justify-content:center;flex-wrap:wrap;margin-bottom:12px">
    <div style="text-align:center">
      <div style="font-size:12px;color:#64748b;margin-bottom:5px">📊 تطور عن الأسبوع الماضي</div>
      <div style="font-size:42px;font-weight:bold;color:${(prog.weekly_dev||0) > 0 ? '#16a34a' : (prog.weekly_dev||0) < 0 ? '#dc2626' : '#64748b'}">${(prog.weekly_dev||0) > 0 ? "+" : ""}${Math.round(prog.weekly_dev||0)}%</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:12px;color:#64748b;margin-bottom:5px">📊 التطور الإجمالي</div>
      <div style="font-size:42px;font-weight:bold;color:${((prog.weekly_rate||0) - (prog.current_score||0)) > 0 ? '#16a34a' : ((prog.weekly_rate||0) - (prog.current_score||0)) < 0 ? '#dc2626' : '#64748b'}">${((prog.weekly_rate||0) - (prog.current_score||0)) > 0 ? "+" : ""}${Math.round((prog.weekly_rate||0) - (prog.current_score||0))}%</div>
    </div>
  </div>
  <div style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin-bottom:12px">
    <div style="background:#e8f5e9;padding:10px 16px;border-radius:8px;min-width:100px;border:1px solid #c8e6c9;text-align:center">
      <div style="font-size:22px;font-weight:bold;color:#16a34a">${Math.round(stats.success_rate||0)}%</div>
      <div style="font-size:11px;font-weight:bold;color:#2e7d32">المعدل الإجمالي</div>
    </div>
    <div style="background:#fff3e0;padding:10px 16px;border-radius:8px;min-width:100px;border:1px solid #ffe0b2;text-align:center">
      <div style="font-size:22px;font-weight:bold;color:#d97706">${Math.round(prog.weekly_rate||0)}%</div>
      <div style="font-size:11px;font-weight:bold;color:#e65100">هذا الأسبوع</div>
    </div>
    <div style="background:#f1f5f9;padding:10px 16px;border-radius:8px;min-width:100px;border:1px solid #e2e8f0;text-align:center">
      <div style="font-size:22px;font-weight:bold;color:#64748b">${Math.round(prog.last_week||0)}%</div>
      <div style="font-size:11px;font-weight:bold;color:#475569">الأسبوع الماضي</div>
    </div>
  </div>`;

  // ── Stats table ──
  html += `<div class="card">
    <div style="color:#1e293b;margin-top:0;border-right:4px solid #2563eb;padding-right:10px;font-weight:700;font-size:14px;margin-bottom:10px">📈 إحصائيات الأداء العام</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <tr><th style="padding:8px 0;text-align:right;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9;padding:8px 12px">المقياس</th><th style="padding:8px 0;text-align:right;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9;padding:8px 12px">القيمة</th></tr>
      <tr><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0">عدد الجلسات الكلي</td><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0"><strong>${stats.total_sessions||0}</strong></td></tr>
      <tr><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0">الإجابات الصحيحة</td><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0"><span style="display:inline-block;padding:4px 10px;border-radius:9999px;color:#fff;font-size:12px;font-weight:bold;background-color:#16a34a">${stats.total_correct||0}</span></td></tr>
      <tr><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0">الإجابات الخاطئة</td><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0"><span style="display:inline-block;padding:4px 10px;border-radius:9999px;color:#fff;font-size:12px;font-weight:bold;background-color:#dc2626">${stats.total_wrong||0}</span></td></tr>
      <tr><td style="padding:8px 12px">معدل النجاح</td><td style="padding:8px 12px"><strong>${(stats.success_rate||0).toFixed(1)}%</strong></td></tr>
    </table>
  </div>`;

  function catRow(label, r) {
    const avg = Math.round(r.rate!=null ? r.rate : r.avg_pct!=null ? r.avg_pct : 0);
    const best = Math.round(r.best||0);
    const lw = r.last_week > 0 ? Math.round(r.last_week) + "%" : "—";
    const tw = r.this_week > 0 ? Math.round(r.this_week) : null;
    const d = r.dev || 0;
    const twStr = tw != null ? `<span style="color:${tw >= 70 ? '#16a34a' : tw >= 40 ? '#d97706' : '#dc2626'}"><strong>${tw}%</strong></span>` : "<span style='color:#d97706'>—</span>";
    const dStr = d > 0 ? `<span style="color:#16a34a">↑ +${Math.round(d)}%</span>` : d < 0 ? `<span style="color:#dc2626">↓ ${Math.round(d)}%</span>` : "<span style='color:#64748b'>➡ 0%</span>";
    return `<tr><td style="padding:6px 8px;border-bottom:1px solid #f1f5f9">${label}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center"><strong>${avg}%</strong></td>
      <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center">${best}%</td>
      <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center">${lw}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center">${twStr}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center">${dStr}</td></tr>`;
  }
  // compute categories/tags from by_type using GAME_CAT/GAME_TAG mappings
  function groupByType(mapping, groups) {
    const byType = Array.isArray(stats.by_type) ? stats.by_type : [];
    const hasCorrect = byType.some(item => item.correct !== undefined);
    const result = {}, totals = {};
    groups.forEach(g => { result[g] = []; totals[g] = {correct:0,total:0,best:0,count:0,sumPct:0}; });
    byType.forEach(item => {
      const g = mapping[item.game_type];
      if (!g || !result[g]) return;
      result[g].push(item);
      totals[g].correct += hasCorrect ? (item.correct||0) : 0;
      totals[g].total += hasCorrect ? (item.total||0) : 0;
      totals[g].best = Math.max(totals[g].best, item.best||0);
      totals[g].count++;
      totals[g].sumPct += item.avg_pct || 0;
    });
    const out = {};
    groups.forEach(g => {
      if (totals[g].count === 0) return;
      let rate;
      if (hasCorrect && totals[g].total > 0)
        rate = Math.round(100 * totals[g].correct / totals[g].total);
      else
        rate = Math.round(totals[g].sumPct / totals[g].count);
      out[g] = {
        rate: rate,
        best: Math.round(totals[g].best),
        last_week: 0, this_week: 0, dev: 0
      };
    });
    return out;
  }
  const domainGroups = ["Cognitif","Physique","Social"];
  const catKeys = Object.keys(stats.categories||{}).filter(k => stats.categories[k]);
  const cats = catKeys.length > 0 ? stats.categories : groupByType(GAME_CAT, domainGroups);
  const computedCats = Object.keys(cats).filter(k => cats[k]);
  if (computedCats.length > 0) {
    html += `<div class="card">
      <div style="color:#1e293b;margin-top:0;border-right:4px solid #2563eb;padding-right:10px;font-weight:700;font-size:14px;margin-bottom:10px">📊 الفئات حسب المجال</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr><th style="padding:8px 8px;text-align:right;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">المجال</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">المعدل</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">الأفضل</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">الأسبوع الماضي</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">هذا الأسبوع</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">التطور</th></tr>`;
    const domainMap = {"Cognitif":"🧠 المعرفي","Physique":"🤚 الحركي","Social":"👥 الاجتماعي"};
    computedCats.forEach(k => html += catRow(domainMap[k] || k, cats[k]));
    html += "</table></div>";
  }
  const tagGroups = ["مطابقة","رياضيات","تركيب و ترتيب","تصنيف","إدراك الفضاء"];
  const tagKeys = Object.keys(stats.tags||{}).filter(k => stats.tags[k]);
  const tags = tagKeys.length > 0 ? stats.tags : groupByType(GAME_TAG, tagGroups);
  const computedTags = Object.keys(tags).filter(k => tags[k]);
  if (computedTags.length > 0) {
    html += `<div class="card">
      <div style="color:#1e293b;margin-top:0;border-right:4px solid #2563eb;padding-right:10px;font-weight:700;font-size:14px;margin-bottom:10px">🎮 الأداء حسب التصنيف</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr><th style="padding:8px 8px;text-align:right;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">التصنيف</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">المعدل</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">الأفضل</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">الأسبوع الماضي</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">هذا الأسبوع</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">التطور</th></tr>`;
    const tagMap = {"مطابقة":"🔍 مطابقة","رياضيات":"📦 رياضيات","تركيب و ترتيب":"🎨 تركيب و ترتيب","تصنيف":"🏷️ تصنيف","إدراك الفضاء":"🧩 إدراك الفضاء"};
    computedTags.forEach(k => html += catRow(tagMap[k] || k, tags[k]));
    html += "</table></div>";
  }

  // ── Last Sessions ──
  html += `<div class="card">
    <div style="color:#1e293b;margin-top:0;border-right:4px solid #2563eb;padding-right:10px;font-weight:700;font-size:14px;margin-bottom:10px">🕐 آخر الجلسات (آخر 10 جلسات)</div>`;
  if (!sessions || sessions.length === 0) {
    html += "<div style='font-size:13px;color:var(--gray);text-align:center;padding:10px'>لا توجد جلسات بعد</div>";
  } else {
    html += `<table style="width:100%;border-collapse:collapse;font-size:12px">
      <tr><th style="padding:8px 8px;text-align:right;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">اللعبة</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">صحيح</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">خطأ</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">النتيجة</th><th style="padding:8px 8px;text-align:center;border-bottom:1px solid #e2e8f0;color:#334155;background:#f1f5f9">التاريخ</th></tr>`;
    sessions.slice(0, 10).forEach(s => {
      const sc = s.pct >= 70 ? "#16a34a" : s.pct >= 40 ? "#d97706" : "#dc2626";
      const date = s.played_at ? new Date(s.played_at).toLocaleDateString("ar-TN") : "";
      html += `<tr><td style="padding:6px 8px;border-bottom:1px solid #f1f5f9">${s.game_label || s.game_type || "—"}</td>
        <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center">${s.correct||0}</td>
        <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center">${s.wrong||0}</td>
        <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center;font-weight:700;color:${sc}">${Math.round(s.pct)}%</td>
        <td style="padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:center;color:var(--gray)">${date}</td></tr>`;
    });
    html += "</table>";
  }
  html += "</div>";

  el.innerHTML = html;
}

// ─── Auto load saved ID ───
const saved = localStorage.getItem("parent_id");
if (saved) {
  document.getElementById("pid-input").value = saved;
  document.getElementById("save-pid").checked = true;
}
document.getElementById("pid-input").focus();
</script>
</body>
</html>
